- Médias & Téléchargements:
    - C411:
        icon: https://c411.org/favicon.ico
        href: https://c411.org
        description: Tracker privé
        widget:
          type: customapi
          url: http://host.docker.internal:8411/
          mappings:
            - field: ratio
              label: Ratio
              format: float
              maximumFractionDigits: 2
            - field: uploaded_gib
              label: Upload
              format: float
              suffix: " GiB"
              maximumFractionDigits: 1
            - field: downloaded_gib
              label: Download
              format: float
              suffix: " GiB"
              maximumFractionDigits: 1

    - Nostradamus:
        icon: https://nostradamus.foo/favicon.ico
        href: https://nostradamus.foo
