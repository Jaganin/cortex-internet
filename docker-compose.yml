services:

  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/secrets:/etc/traefik/secrets:ro
      - traefik-certs:/etc/traefik/certs

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    user: "1000:1000"
    networks:
      - proxy
    volumes:
      - ./authelia:/config
    environment:
      - AUTHELIA_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      - AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET=${AUTHELIA_OIDC_HMAC_SECRET}
      - AUTHELIA_NOTIFIER_SMTP_PASSWORD=${AUTHELIA_SMTP_PASSWORD}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: authelia-redis
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - redis-data:/data

  homepage:
    image: homepage-jeedom:latest
    container_name: homepage
    restart: unless-stopped
    user: "1000:111"
    networks:
      - proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=dashboard.jaganin.duckdns.org
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro

  sharkord:
    image: sharkord/sharkord:latest
    container_name: sharkord
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "40000:40000/tcp"
      - "40000:40000/udp"
    volumes:
      - /mnt/synology/sharkorb:/home/bun/.config/sharkord

  leboncoin-mcp:
    build:
      context: ./lbc-mcp
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        CMD ["python", "-c", "import server; server.mcp.run(transport='http', host='0.0.0.0', port=8040)"]
    container_name: leboncoin-mcp
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    name: proxy
    driver: bridge

volumes:
  traefik-certs:
  redis-data:
