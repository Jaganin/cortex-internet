http:
  serversTransports:
    insecureTransport:
      insecureSkipVerify: true

  services:
    authelia:
      loadBalancer:
        servers:
          - url: "http://authelia:9091"

    jeedom:
      loadBalancer:
        serversTransport: insecureTransport
        servers:
          - url: "https://192.168.1.2"

    qbittorrent:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8080"

    alfred:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:18789"

    jellyfin:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8096"

    nextcloud:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8090"

    paperless:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8010"

    immich:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:2283"

    radarr:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:7878"

    sonarr:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8989"

    readarr:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8787"

    prowlarr:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:9696"

    openhands:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3000"

    homepage:
      loadBalancer:
        servers:
          - url: "http://homepage:3000"

    synology:
      loadBalancer:
        servers:
          - url: "http://192.168.1.5:5000"

    adguard:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3002"

    autoclaude:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3001"

    sparkyfitness:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3004"

  routers:
    # All routers reference the same wildcard cert (*.jaganin.duckdns.org)
    # so Traefik only requests it once via DuckDNS DNS-01 challenge.

    jeedom:
      rule: "Host(`jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - secure-headers
      service: jeedom

    jeedom-subdomain:
      rule: "Host(`jeedom.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - secure-headers
      service: jeedom

    www:
      rule: "Host(`www.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - www-to-jeedom-dashboard
      service: jeedom

    authelia:
      rule: "Host(`auth.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      service: authelia

    traefik-dashboard:
      rule: "Host(`traefik.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - authelia
        - secure-headers
      service: api@internal

    qbittorrent:
      rule: "Host(`qbittorrent.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
