http:
  # Services running on Cortex host (via host.docker.internal)
  # + internal Docker services (authelia on proxy network)
  services:
    authelia:
      loadBalancer:
        servers:
          - url: "http://authelia:9091"

    qbittorrent:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8080"

    alfred:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:18789"

    jellyfin:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8096"

    nextcloud:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8090"

    paperless:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8010"

    immich:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:2283"

    openhands:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3000"

  routers:
    # Authelia portal — no auth middleware (it IS the auth)
    authelia:
      rule: "Host(`auth.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
      service: authelia

    # Traefik dashboard
    traefik-dashboard:
      rule: "Host(`traefik.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
      middlewares:
        - authelia
        - secure-headers
      service: api@internal

    qbittorrent:
      rule: "Host(`qbittorrent.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
      middlewares:
        - authelia
        - secure-headers
      service: qbittorrent

    alfred:
      rule: "Host(`alfred.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
      middlewares:
        - authelia
        - secure-headers
      service: alfred

    jellyfin:
      rule: "Host(`jellyfin.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
      # Jellyfin gère sa propre auth
      middlewares:
        - secure-headers
      service: jellyfin

    nextcloud:
      rule: "Host(`nextcloud.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
      middlewares:
        - secure-headers
      service: nextcloud

    paperless:
      rule: "Host(`paperless.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
      middlewares:
        - authelia
        - secure-headers
      service: paperless

    immich:
      rule: "Host(`immich.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
      # Immich gère sa propre auth
      middlewares:
        - secure-headers
      service: immich

    openhands:
      rule: "Host(`openhands.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
      middlewares:
        - authelia
        - secure-headers
      service: openhands
