      service: autoclaude

    radarr:
      rule: "Host(`radarr.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - authelia
        - secure-headers
      service: radarr

    sonarr:
      rule: "Host(`sonarr.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - authelia
        - secure-headers
      service: sonarr

    readarr:
      rule: "Host(`readarr.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - authelia
        - secure-headers
      service: readarr

    prowlarr:
      rule: "Host(`prowlarr.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - authelia
        - secure-headers
      service: prowlarr

    sparkyfitness:
      rule: "Host(`health.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - secure-headers
      service: sparkyfitness

    sharkord:
      rule: "Host(`sharkord.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - secure-headers
      service: sharkord

    budget:
      rule: "Host(`budget.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - authelia
        - secure-headers
      service: actual-budget

    invest:
      rule: "Host(`invest.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - authelia
        - secure-headers
      service: ghostfolio

    mycgp:
      rule: "Host(`mycgp.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - authelia
        - secure-headers
      service: mycgp

    # MyCGP's own API already authenticates every /api/v1/* route itself
    # (session cookie or revocable X-API-Key, MyCGP#31/#36) — Authelia would
    # only add a second, redundant gate that a plain API client (curl,
    # scripts) can't pass at all, since it has no Authelia session. Same
    # pattern as autoclaude-credentials below.
    mycgp-api:
      rule: "Host(`mycgp.jaganin.duckdns.org`) && PathPrefix(`/api`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - secure-headers
      service: mycgp

    leboncoin-mcp:
      rule: "Host(`leboncoin.jaganin.duckdns.org`)"
      entrypoints:
        - websecure
      tls:
        certResolver: duckdns
        domains:
          - main: "jaganin.duckdns.org"
            sans:
              - "*.jaganin.duckdns.org"
      middlewares:
        - leboncoin-mcp-auth
        - secure-headers
      service: leboncoin-mcp
