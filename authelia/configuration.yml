        public: false
        authorization_policy: two_factor
        consent_mode: implicit
        pre_configured_consent_duration: 1y
        redirect_uris:
          - https://photo.jaganin.duckdns.org/auth/login
          - app.immich:///oauth-callback
        scopes:
          - openid
          - profile
          - email
        token_endpoint_auth_method: client_secret_post

      - client_id: nextcloud
        client_name: Nextcloud
        # Secret hashed with argon2 — plain value in .env as AUTHELIA_OIDC_NEXTCLOUD_SECRET
