---
theme: dark

server:
  address: tcp://0.0.0.0:9091

log:
  level: info

totp:
  issuer: jaganin.duckdns.org
  period: 30
  skew: 1

identity_validation:
  reset_password:
    jwt_secret: "{{ env \"AUTHELIA_JWT_SECRET\" }}"

authentication_backend:
  file:
    path: /config/users_database.yml
    watch: true
    search:
      email: false
      case_insensitive: false
    password:
      algorithm: argon2
      argon2:
        variant: argon2id
        iterations: 3
        memory: 65536
        parallelism: 4
        key_length: 32
        salt_length: 16

access_control:
  default_policy: deny
  rules:
    # Authelia portal — always accessible
    - domain: "auth.jaganin.duckdns.org"
      policy: bypass

    # Immich — auth handled natively via OIDC
    - domain: "photo.jaganin.duckdns.org"
      policy: bypass

    # All other services require 2FA
    - domain: "*.jaganin.duckdns.org"
      policy: two_factor

session:
  name: authelia_session
  same_site: lax
  inactivity: 5m
  expiration: 1h
  remember_me: 1M
  cookies:
    - name: authelia_session
      domain: jaganin.duckdns.org
      authelia_url: https://auth.jaganin.duckdns.org
      default_redirection_url: https://traefik.jaganin.duckdns.org
  redis:
    host: redis
    port: 6379

regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 5m

storage:
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notifications.txt

identity_providers:
  oidc:
    # hmac_secret provided via AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET env var
    jwks:
      - key_id: main
        algorithm: RS256
        use: sig
        key_file: /config/secrets/oidc_jwk.pem
    clients:
      - client_id: immich
        client_name: Immich
        # Secret hashed with argon2 — plain value in .env as AUTHELIA_OIDC_IMMICH_SECRET
        client_secret: '$argon2id$v=19$m=65536,t=3,p=4$6SuglCtQVUGI7fsyuQFidw$2K3Ev2dTqa4MBC5b/qGO7+8Z+mH9f9PXT8/+klwKn/c'
        public: false
        authorization_policy: two_factor
        consent_mode: implicit
        pre_configured_consent_duration: 1y
        redirect_uris:
          - https://photo.jaganin.duckdns.org/auth/login
          - app.immich:///oauth-callback
        scopes:
          - openid
          - profile
          - email
        token_endpoint_auth_method: client_secret_post
